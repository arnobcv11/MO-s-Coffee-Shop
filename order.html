<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mo's Coffee Shop | Order Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo.svg" alt="Mo's Coffee Shop Logo">
        <h1>Order Online</h1>
    </div>
    
<nav>
  <a href="index.html">Home</a>
  <a href="contact.html">Contact</a>
  <a href="menu.html">Menu</a>
  <a href="order.html">Order Online</a>
  <a href="career.html">Career</a>
    <a href="customer-info.html">Customer Information</a>
</nav>

</header>

<main>
<section>
    <h2 class="section-title">Place a Pickup Order</h2>

    <form>
        <label for="name">Customer Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">

        <label for="drink">Choose Drink</label>
        <select id="drink">
            <option>Latte</option>
            <option>Espresso</option>
            <option>Cappuccino</option>
            <option>Mocha</option>
            <option>Iced Coffee</option>
            <option>Cold Brew</option>
            <option>Caramel Frappé</option>
        </select>

        <label for="size">Choose Size</label>
        <select id="size">
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
        </select>

        <label for="pickup">Pickup Time</label>
        <input type="time" id="pickup">

        <label for="notes">Special Instructions</label>
        <textarea id="notes" placeholder="Example: less sugar, oat milk, extra ice"></textarea>

        <button type="button">Submit Order</button>
    </form>
</section>
</main>

<footer>
    <small>Mohammad Rahman | Website: <a href="https://arnobcv11.github.io/MO-s-Coffee-Shop/">GitHub Pages</a></small>
</footer>

</body>
</html>
